services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: palestine_signals
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d palestine_signals"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - signal-db:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://signal:signal@db:5432/palestine_signals}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:5173}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_HOST_PORT:-18000}:8000"
    volumes:
      - ./sessions:/app/sessions

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://signal:signal@db:5432/palestine_signals}
    command: python -m app.worker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions

  ui:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${API_PUBLIC_URL:-http://127.0.0.1:18000/api}
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  signal-db:
